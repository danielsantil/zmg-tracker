<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZMG Release Tracker</title>
    <script>
      // Set data-theme before first paint so a light-mode reload never flashes dark. A saved choice
      // (zmg.theme, JSON) wins, else follow the OS. Mirrors resolveInitialTheme() in hooks/useTheme.ts.
      (function () {
        try {
          var raw = localStorage.getItem('zmg.theme');
          var t = raw ? JSON.parse(raw) : null;
          if (t !== 'light' && t !== 'dark') {
            t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.dataset.theme = t;
        } catch (e) {
          document.documentElement.dataset.theme = 'dark';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
