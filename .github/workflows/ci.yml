name: CI

on:
  pull_request:
    paths-ignore:
      - 'plans/**'
      - '.claude/**'
      - '**/*.md'
      - 'Dockerfile'
  push:
    branches: [main]
    paths-ignore:
      - 'plans/**'
      - '.claude/**'
      - '**/*.md'
      - 'Dockerfile'

# Cancel any in-progress runs of this workflow if a new run is triggered for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend .NET
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json #version pinned in global.json

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release

  frontend:
    name: Frontend React SPA
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Zmg.Web
    steps:
      - uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          package_json_file: src/Zmg.Web/package.json

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: src/Zmg.Web/.nvmrc
          cache: pnpm
          cache-dependency-path: src/Zmg.Web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
